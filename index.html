<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>حجز عاملات منزلية</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      background: linear-gradient(#f4f4f4,#eaeaea);
      margin:0;
      padding:0;
      text-align:center;
    }

    .box{
      max-width:420px;
      margin:50px auto;
      background:#fff;
      padding:25px;
      border-radius:18px;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
    }

    h1{
      font-size:22px;
      margin-bottom:10px;
      color:#222;
    }

    p{
      font-size:14px;
      color:#666;
      margin-bottom:20px;
      line-height:1.6;
    }

    .badge{
      display:inline-block;
      background:#e7f8ed;
      color:#1a7f3c;
      padding:6px 12px;
      border-radius:20px;
      font-size:12px;
      margin-bottom:15px;
    }

    .btn{
      display:block;
      padding:15px;
      margin:10px 0;
      border-radius:12px;
      text-decoration:none;
      font-size:16px;
      font-weight:bold;
      color:#fff;
      transition:0.2s;
    }

    .btn:hover{
      transform:scale(1.03);
    }

    .b4{background:#3498db;}
    .b6{background:#f39c12;}
    .b8{background:#e74c3c;}

    .wa{
      background:#25D366;
      margin-top:15px;
      font-size:18px;
      box-shadow:0 6px 15px rgba(37,211,102,0.3);
    }

    .small{
      font-size:12px;
      color:#888;
      margin-top:15px;
    }
  </style>
</head>

<body>

  <div class="box">

    <div class="badge">⚡ حجز سريع خلال دقائق</div>

    <h1>خدمة عاملات منزلية</h1>

    <p>
      اختر مدة الحجز المناسبة لك، وتواصل معنا مباشرة عبر واتساب
    </p>

    <!-- أزرار الحجز -->
    <a class="btn b4"
       href="https://wa.me/966530150488?text=أريد حجز عاملة لمدة 4 ساعات"
       target="_blank">
      حجز 4 ساعات
    </a>

    <a class="btn b6"
       href="https://wa.me/966530150488?text=أريد حجز عاملة لمدة 6 ساعات"
       target="_blank">
      حجز 6 ساعات
    </a>

    <a class="btn b8"
       href="https://wa.me/966530150488?text=أريد حجز عاملة لمدة 8 ساعات"
       target="_blank">
      حجز 8 ساعات
    </a>

    <!-- زر واتساب قوي -->
    <a class="btn wa"
       href="https://wa.me/966530150488?text=مرحباً أريد الاستفسار عن الخدمة"
       target="_blank">
      💬 تواصل واتساب الآن
    </a>

    <div class="small">
      اختر الخدمة المناسبة وسيتم الرد عليك مباشرة
    </div>

  </div>

</body>
</html>
