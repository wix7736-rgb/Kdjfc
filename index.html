<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>خدمة تأجير عاملات منزلية</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      background: linear-gradient(#f4f4f4,#e9e9e9);
      margin:0;
      padding:0;
      text-align:center;
    }

    .box{
      background:#fff;
      max-width:420px;
      margin:70px auto;
      padding:25px;
      border-radius:18px;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
    }

    h1{
      font-size:22px;
      color:#222;
      margin-bottom:10px;
    }

    p{
      font-size:15px;
      color:#555;
      line-height:1.7;
      margin-bottom:20px;
    }

    .badge{
      display:inline-block;
      background:#ffefc1;
      color:#7a5a00;
      padding:6px 12px;
      border-radius:20px;
      font-size:12px;
      margin-bottom:15px;
    }

    .btn{
      display:block;
      background:#25D366;
      color:#fff;
      padding:18px;
      border-radius:14px;
      text-decoration:none;
      font-size:18px;
      font-weight:bold;
      margin-top:15px;
      box-shadow:0 6px 15px rgba(37,211,102,0.3);
      transition:0.2s;
    }

    .btn:hover{
      background:#1ebe5d;
      transform:scale(1.02);
    }

    .small{
      font-size:12px;
      color:#888;
      margin-top:15px;
    }

    .icon{
      font-size:20px;
      margin-left:5px;
    }
  </style>
</head>

<body>

  <div class="box">

    <div class="badge">⚡ رد سريع خلال دقائق</div>

    <h1>تأجير عاملات منزلية</h1>

    <p>
      نوفر عاملات تنظيف ورعاية منزلية بخبرة عالية<br>
      تواصل مباشر وسريع عبر واتساب بدون تعقيد
    </p>

    <a class="btn"
       href="https://wa.me/966530150488?text=مرحباً، أريد الاستفسار عن خدمة تأجير العاملات المنزلية"
       target="_blank">
      💬 تواصل عبر واتساب الآن
    </a>

    <div class="small">
      بالضغط على الزر سيتم تحويلك مباشرة إلى واتساب
    </div>

  </div>

</body>
</html>
